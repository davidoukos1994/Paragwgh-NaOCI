<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2b003f" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <title>NaOCl Storage</title>
</head>
<body>
  <header>
    <h1>HYPOCHLORITE STORAGE</h1>
    <p>Υπολογισμός γεμίσματος δεξαμενών NaOCl</p>
  </header>

  <main>
    <section class="panel top-panel">
      <label>Παραγωγή kg/hr
        <input id="production" type="number" step="0.01" inputmode="decimal" />
      </label>
      <label>Ημερομηνία / Ώρα έναρξης
        <input id="startTime" type="datetime-local" />
      </label>
      <button id="nowBtn" type="button">Τώρα</button>
      <button id="saveBtn" type="button">Αποθήκευση βάρδιας</button>
      <button id="resetBtn" type="button">Reset</button>
    </section>

    <section class="summary">
      <div><span>Σύνολο τώρα</span><strong id="totalNow">-</strong></div>
      <div><span>Χωρητικότητα στόχου</span><strong id="totalMax">-</strong></div>
      <div><span>Λείπουν</span><strong id="totalMissing">-</strong></div>
      <div><span>Γεμίζουν όλες</span><strong id="allFullTime">-</strong></div>
    </section>

    <section class="legend">
      <span>Σειρά γεμίσματος: βάλε 1,2,3... Μία δεξαμενή γεμίζει κάθε φορά με όλη την παραγωγή.</span>
    </section>

    <section id="tanks" class="tank-grid"></section>

    <section class="panel">
      <h2>Πρόγραμμα γεμίσματος</h2>
      <div id="schedule" class="schedule"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
